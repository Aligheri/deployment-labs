services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: mywebapp_pass
      POSTGRES_DB: mywebapp
    networks:
      - lab2_net
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywebapp -d mywebapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    volumes:
      - ./deploy/config/config.yaml:/etc/mywebapp/config.yaml:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mywebapp
      SERVER_ADDRESS: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lab2_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/mywebapp.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - lab2_net

volumes:
  db_data:

networks:
  lab2_net:
    driver: bridge
