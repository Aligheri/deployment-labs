spring:
  application:
    name: mywebapp
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/mywebapp
    username: mywebapp
    password: mywebapp_pass
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: 8080
  address: 127.0.0.1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/mywebapp?options=-c%20TimeZone%3DUTC
  jpa:
    hibernate:
      ddl-auto: update

server:
  address: 0.0.0.0